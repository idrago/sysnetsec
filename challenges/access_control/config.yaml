network:
  name: ctf_network
  subnet: 10.128.0.0/9

# Default service configuration for all exercises
service_defaults:
  init: true
  tty: true
  restart: unless-stopped
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3
  cap_drop: ['ALL']
  cap_add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE', 'SYS_PTRACE', 'LINUX_IMMUTABLE', 'DAC_OVERRIDE', 'CAP_FOWNER']

exercises:
  base_path: /home/vagrant
  
  configs:
    0:
      name: access_control_00
      description: "Privilege escalation via sudo misconfiguration"
      address: 10.128.0.10/32
      build: "./access_control_00"
    
    1:
      name: access_control_01
      description: "Shadow file permission exploitation"
      address: 10.128.0.11/32
      build: "./access_control_01"
    
    2:
      name: access_control_02
      description: "SSH key misconfiguration exercise"
      address: 10.128.0.12/32
      build: "./access_control_02"
    
    3:
      name: access_control_03
      description: "Exploiting writable cron jobs"
      address: 10.128.0.13/32
      build: "./access_control_03"
    
    4:
      name: access_control_04
      description: "SUID find command exploitation"
      address: 10.128.0.14/32
      build: "./access_control_04"
    
    5:
      name: access_control_05
      description: "SUID binary with environment variables exploitation"
      address: 10.128.0.15/32
      build: "./access_control_05"
    
    6:
      name: access_control_06
      description: "Python library path exploitation"
      address: 10.128.0.16/32
      build: "./access_control_06"
  
    7:
      name: access_control_07
      description: "Nginx configuration exploitation"
      cap_add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE', 'SYS_PTRACE', 'LINUX_IMMUTABLE', 'DAC_OVERRIDE', 'NET_BIND_SERVICE', 'CAP_FOWNER']
      ports:
        - "80:80"
      address: 10.128.0.17/32
      build: "./access_control_07"
    
    8:
      name: access_control_08
      description: "PostgreSQL permissions exploitation"
      cap_add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE', 'SYS_PTRACE', 'LINUX_IMMUTABLE', 'DAC_OVERRIDE', 'NET_BIND_SERVICE', 'CAP_FOWNER']
      address: 10.128.0.18/32
      build: "./access_control_08"

vms:
  student_prefix: "student"
  vagrant_path: "vms/.vagrant/machines"
  vm_provider: "libvirt"
  
  groups:
    lab01:
      range: [2, 2]
      ssh_user: vagrant
      ssh_key: "{vagrant_path}/{student_prefix}{id}-{vm_suffix}/{vm_provider}/private_key"
      ip_network: 192.168.254.0/24
      vm_suffix: "vm1"
      exercises: [0, 1, 2, 3, 4, 5, 6, 7, 8]
      host_flag: False