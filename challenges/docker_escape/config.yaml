network:
  name: ctf_network
  subnet: 10.128.0.0/9

# Default service configuration for all exercises
service_defaults:
  init: true
  tty: true
  restart: unless-stopped
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3
  build: "./docker_escape"
  cap_drop: ['ALL']

exercises:
  base_path: /root
  
  configs:
    0:
      name: docker_escape
      description: "Escape Docker container through dangerous volume mounts"
      address: 10.192.0.10/32
      cap_add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE', 'SYS_PTRACE', 'LINUX_IMMUTABLE', 'DAC_OVERRIDE', 'CAP_FOWNER']
      volumes:
        - "/var/run/docker.sock:/var/run/docker.sock:rw"
      environment:
        - "DIFFICULTY=easy"
      deploy_flags: False        
    
    1:
      name: docker_escape
      description: "Escape Docker container through excessive capabilities"
      address: 10.224.0.10/32
      cap_add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE', 'SYS_PTRACE', 'LINUX_IMMUTABLE', 'DAC_OVERRIDE', 'CAP_FOWNER', 'SYS_ADMIN', 'SYS_MODULE'] 
      environment:
        - "DIFFICULTY=medium"
      deploy_flags: False

vms:
  student_prefix: "student"
  
  groups:
    # VM for dangerous mount exercise
    lab01:
      range: [2, 2]
      ip_network: 192.168.253.0/24
      vm_suffix: "vm2"
      exercises: [0]
      host_flag: true
      host_flag_random: True
    
    # VM for excessive capabilities exercise
    lab02:
      range: [2, 2]
      ip_network: 192.168.252.0/24
      vm_suffix: "vm3"
      exercises: [1]
      host_flag: true
      host_flag_random: True