network:
  name: ctf_network
  subnet: 10.128.0.0/9

# Default service configuration for all exercises
service_defaults:
  init: true
  tty: true
  restart: unless-stopped
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3
  cap_drop: ['ALL']
  cap_add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE', 'SYS_PTRACE', 'LINUX_IMMUTABLE', 'DAC_OVERRIDE', 'FOWNER']

exercises:
  base_path: /root
  
  configs:
    0:
      name: scanning_00_snmp
      description: "Scanning for services -- SNMP"
      address: "{{random_ip:10.128.0.0/10}}"
      build: "./scanning_00_snmp"
      environment:
        - "DIFFICULTY=medium"      
      deploy_flags: False
      template_files:
        - "snmpd.conf"
      template_vars:
        PORT: "{{random_port}}"
        COMMUNITY_STRING: "public"
        SYSTEM_NAME: "{{generate_flag}}"

vms:
  student_prefix: "student"
  groups:
    lab01:
      range: [2, 2]
      vm_suffix: "vm1"
      exercises: [0]
      host_flag: False