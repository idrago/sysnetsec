# roles/networking/tasks/ensure_network.yml
---
- name: Get existing LXD networks
  command: lxc network list --format=json
  register: network_list
  changed_when: false

- name: Parse JSON output
  set_fact:
    existing_networks: "{{ network_list.stdout | from_json | map(attribute='name') | list }}"
  changed_when: false

- name: Set network variables
  set_fact:
    network_name: "vm{{ vm_num }}net"
    subnet_num: "{{ ctf_environment.networking.start_subnet - (vm_num - 1) }}"
  changed_when: false

- name: Calculate subnet
  set_fact:
    subnet: "{{ ctf_environment.networking.base_subnet }}.{{ subnet_num }}.0/24"
  changed_when: false

- name: Create LXD network if it doesn't exist
  command: "lxc network create {{ network_name }}"
  register: network_create
  failed_when: network_create.rc != 0 and 'already exists' not in network_create.stderr | default('')
  changed_when: network_create.rc == 0
  when: network_name not in existing_networks

- name: Configure network
  command: "{{ item }}"
  loop:
    - "lxc network set {{ network_name }} ipv4.address={{ ctf_environment.networking.base_subnet }}.{{ subnet_num }}.1/24"
    - "lxc network set {{ network_name }} ipv4.nat true"
    - "lxc network set {{ network_name }} ipv4.dhcp true"
  register: network_config
  changed_when: network_config.rc == 0
  when: network_name not in existing_networks or network_create.changed