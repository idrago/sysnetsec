# roles/networking/tasks/main.yml
---
- name: Get required VM types for networking
  set_fact:
    required_vm_types: "{{ ctf_environment.vm_types | map(attribute='id') | list }}"
  changed_when: false

- name: Get existing LXD networks
  command: lxc network list --format=json
  register: network_list
  changed_when: false

- name: Parse JSON output
  set_fact:
    existing_networks: "{{ network_list.stdout | from_json | map(attribute='name') | list }}"
  changed_when: false

- name: Create networks for all VM types
  block:
    - name: Show VM types to create networks for
      debug:
        msg: "Creating networks for VM types: {{ required_vm_types }}"

    - name: Create LXD network for VM type
      command: "lxc network create vm{{ item }}net"
      register: network_create
      failed_when: network_create.rc != 0 and 'already exists' not in network_create.stderr | default('')
      changed_when: network_create.rc == 0
      with_items: "{{ required_vm_types }}"
      when: "'vm' + item | string + 'net' not in existing_networks"
      
    - name: Configure network subnet
      command: >
        lxc network set vm{{ item }}net 
        ipv4.address={{ ctf_environment.networking.base_subnet }}.{{ ctf_environment.networking.start_subnet - (item - 1) }}.1/24
      with_items: "{{ required_vm_types }}"
      register: network_config
      changed_when: network_config.rc == 0
      
    - name: Enable NAT on network
      command: lxc network set vm{{ item }}net ipv4.nat true
      with_items: "{{ required_vm_types }}"
      register: network_nat
      changed_when: network_nat.rc == 0
      
    - name: Enable DHCP on network
      command: lxc network set vm{{ item }}net ipv4.dhcp true
      with_items: "{{ required_vm_types }}"
      register: network_dhcp
      changed_when: network_dhcp.rc == 0