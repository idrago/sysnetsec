# roles/wireguard/tasks/process_vm_type.yml
---
# Look up VM type configuration
- name: Look up VM type config for multiple VM
  set_fact:
    current_vm_type: "{{ ctf_environment.vm_types | selectattr('id', 'equalto', current_vm_type_id) | first | default({}) }}"
  changed_when: false

- name: Debug VM type information
  debug:
    msg: "Processing VM type {{ current_vm_type_id }}: {{ current_vm_type }}"
    verbosity: 1

- name: Add VM subnet to student subnets
  set_fact:
    student_subnets: "{{ student_subnets | combine({
      current_vm_type.name | default('vm' + current_vm_type_id | string): {
        'subnet': current_vm_type.subnet_range | default(ctf_environment.wireguard.student_visible_network),
        'vm_ip': ctf_environment.networking.base_subnet + '.' + 
               (ctf_environment.networking.start_subnet - (current_vm_type_id - 1)) | string + '.' + 
               student_id | string
      }
    }) }}"
  when: current_vm_type is defined