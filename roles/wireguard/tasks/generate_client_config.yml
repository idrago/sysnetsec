# roles/wireguard/tasks/generate_client_config.yml
---
- name: Generate client private key for student {{ student_id }}
  shell: wg genkey
  register: client_private_key
  changed_when: true
  no_log: true

- name: Generate client public key from private key
  shell: echo {{ client_private_key.stdout }} | wg pubkey
  register: client_public_key
  changed_when: true

- name: Determine VM types for this student
  set_fact:
    student_vm_types: "{{ student_assignments[student_id | string] | default([1]) }}"
  changed_when: false

- name: Debug VM types for student
  debug:
    msg: "Student {{ student_id }} has VM types: {{ student_vm_types }}"
    verbosity: 1

- name: Set student subnet mapping
  set_fact:
    student_subnets: {}
  changed_when: false

- name: Calculate VM subnets for student
  block:
    # Handle single VM case - the VM gets the entire student network
    - name: Set single VM handling full network (if student has only one VM type)
      set_fact:
        vm_type_id: "{{ student_vm_types[0] }}"
      when: student_vm_types | length == 1

    - name: Look up VM type config for single VM
      set_fact:
        vm_type_config: "{{ ctf_environment.vm_types | selectattr('id', 'equalto', vm_type_id) | first | default({}) }}"
      when: student_vm_types | length == 1 and vm_type_id is defined
      
    - name: Create subnet for single VM
      set_fact:
        student_subnets: "{{ student_subnets | combine({
          vm_type_config.name | default('vm' + vm_type_id | string): {
            'subnet': ctf_environment.wireguard.student_visible_network,
            'vm_ip': ctf_environment.networking.base_subnet + '.' + 
                   (ctf_environment.networking.start_subnet - (vm_type_id - 1)) | string + '.' + 
                   student_id | string
          }
        }) }}"
      when: student_vm_types | length == 1 and vm_type_id is defined and vm_type_config is defined

    # Process each VM type for multiple VMs
    - name: Process each VM type for multiple VMs
      include_tasks: process_vm_type.yml
      loop: "{{ student_vm_types }}"
      loop_control:
        loop_var: current_vm_type_id
      when: student_vm_types | length > 1

- name: Update global subnet mapping
  set_fact:
    subnet_mapping: "{{ subnet_mapping | combine({
      'student' + '%03d' | format(student_id): student_subnets
    }) }}"
  changed_when: false

- name: Generate client config file
  template:
    src: wg0.conf.j2
    dest: "{{ wireguard_config_dir | default('.vpnconfig') }}/student_{{ '%03d' | format(student_id) }}.conf"
    mode: '0600'
  vars:
    wg_client_ip: "{{ ctf_environment.wireguard.client_prefix }}.{{ student_id }}"
    wg_allowed_ips: "{{ ctf_environment.wireguard.student_visible_network }}"

- name: Generate peer config for server configuration
  set_fact:
    wg_peer_configs: "{{ wg_peer_configs + [
      '[Peer]',
      '# Student ' + student_id | string + ' peer configuration',
      'PublicKey = ' + client_public_key.stdout,
      'AllowedIPs = ' + ctf_environment.wireguard.client_prefix + '.' + student_id | string + '/32'
    ] }}"

- name: Generate iptables rules for student
  set_fact:
    wg_peer_rules: "{{ wg_peer_rules + [ipv4_rules] }}"
  vars:
    student_table: "{{ 100 + student_id }}"
    wg_client_ip: "{{ ctf_environment.wireguard.client_prefix }}.{{ student_id }}"
    ipv4_rules: |
      # ******************************************************
      # Student {{ student_id }} iptables configuration

      # Create a dedicated routing table for this student
      PostUp = ip rule add from {{ wg_client_ip }}/32 table {{ student_table }}

      # Allow student to reach target networks and receive responses
      PostUp = iptables -A chain-pg -s {{ wg_client_ip }}/32 -d {{ ctf_environment.wireguard.student_visible_network }} -j ACCEPT
      PostUp = iptables -A chain-pg -s {{ ctf_environment.wireguard.student_visible_network }} -d {{ wg_client_ip }}/32 -j ACCEPT
      
      {% for vm_name, vm_data in student_subnets.items() %}
      # Routes for {{ vm_name }} ({{ vm_data.vm_ip }}) handling subnet {{ vm_data.subnet }}
      PostUp = ip route add {{ vm_data.subnet }} via {{ vm_data.vm_ip }} table {{ student_table }}
      
      # Allow this VM to access internet
      PostUp = iptables -A chain-pg -s {{ vm_data.vm_ip }}/32 -o {{ ctf_environment.wireguard.internet_interface }} ! -d {{ ctf_environment.wireguard.blocked_networks }} -j ACCEPT
      
      # Allow communication between the WireGuard client and this VM
      PostUp = iptables -A chain-pg -s {{ wg_client_ip }}/32 -d {{ vm_data.vm_ip }}/32 -j ACCEPT
      PostUp = iptables -A chain-pg -s {{ vm_data.vm_ip }}/32 -d {{ wg_client_ip }}/32 -j ACCEPT
      {% endfor %}
      
      # Block VMs from accessing unauthorized networks
      {% for vm_name, vm_data in student_subnets.items() %}
      PostUp = iptables -A chain-pg -s {{ vm_data.vm_ip }}/32 -j DROP
      {% endfor %}
      
      # Final drop rule for the WireGuard client
      PostUp = iptables -A chain-pg -s {{ wg_client_ip }}/32 -j DROP
      
      # Cleanup rules
      PostDown = ip rule del from {{ wg_client_ip }}/32 table {{ student_table }}

- name: Set facts for template use
  set_fact:
    client_key: "{{ client_private_key.stdout }}"