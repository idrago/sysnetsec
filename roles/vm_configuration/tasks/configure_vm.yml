# roles/vm_configuration/tasks/configure_vm.yml
---
- name: Extract student number and VM type from name
  set_fact:
    vm_parts: "{{ vm.name | regex_search('^student([0-9]+)-(.+)$') }}"
  changed_when: false

- name: Set student_id and vm_name variables
  set_fact:
    student_id: "{{ vm_parts[1] | int }}"
    vm_name_type: "{{ vm_parts[2] }}"
  changed_when: false
  when: vm_parts is defined and vm_parts | length > 2

- name: Find VM type config
  set_fact:
    vm_type_config: "{{ ctf_environment.vm_types | selectattr('name', 'equalto', vm_name_type) | first | default({}) }}"
  changed_when: false
  when: vm_name_type is defined

- name: Set Docker network variable
  set_fact:
    student_subnet: "{{ vm_type_config.subnet_range | default(ctf_environment.wireguard.student_visible_network) }}"
  changed_when: false
  when: vm_type_config is defined

# Get the actual network interface name
- name: Determine network interface name
  shell: |
    lxc exec {{ vm.name }} -- bash -c "ip -o link show | grep -v lo | grep -v docker | head -1 | awk -F': ' '{print \$2}'"
  register: interface_name
  changed_when: false

- name: Set interface name variable
  set_fact:
    nic_name: "{{ interface_name.stdout | default('eth0') }}"
  changed_when: false

# Network configuration
- name: Enable IPv4 forwarding in VM
  command: lxc exec {{ vm.name }} -- bash -c "echo 'net.ipv4.ip_forward=1' >> /etc/sysctl.conf"
  register: sysctl_result
  changed_when: sysctl_result.rc == 0
  failed_when: false

- name: Apply sysctl settings in VM
  command: lxc exec {{ vm.name }} -- sysctl -p
  register: apply_sysctl
  changed_when: apply_sysctl.rc == 0
  failed_when: false

# Check if we have everything needed to create the forwarding setup
- name: Check if we have all required information for forwarding
  set_fact:
    can_setup_forwarding: "{{ student_subnet is defined and nic_name is defined }}"
  changed_when: false

- name: Create iptables rules script in VM
  shell: |
    lxc exec {{ vm.name }} -- bash -c "cat > /usr/local/bin/setup-forwarding.sh << EOF
    #!/bin/bash
    # Allow forwarding
    iptables -P FORWARD ACCEPT
    
    # Clear any existing rules
    iptables -F FORWARD
    
    # Allow traffic to/from the student subnet
    iptables -A FORWARD -i {{ nic_name }} -d {{ student_subnet }} -j ACCEPT
    iptables -A FORWARD -s {{ student_subnet }} -o {{ nic_name }} -j ACCEPT
    EOF"
  register: script_result
  changed_when: script_result.rc == 0
  when: can_setup_forwarding

- name: Make script executable
  command: lxc exec {{ vm.name }} -- chmod +x /usr/local/bin/setup-forwarding.sh
  register: chmod_result
  changed_when: chmod_result.rc == 0
  when: can_setup_forwarding and script_result.changed

- name: Create systemd service for iptables rules
  shell: |
    lxc exec {{ vm.name }} -- bash -c "cat > /etc/systemd/system/setup-forwarding.service << EOF
    [Unit]
    Description=Setup IP forwarding rules
    After=docker.service
    
    [Service]
    Type=oneshot
    ExecStart=/usr/local/bin/setup-forwarding.sh
    RemainAfterExit=yes
    
    [Install]
    WantedBy=multi-user.target
    EOF"
  register: service_result
  changed_when: service_result.rc == 0
  when: can_setup_forwarding

- name: Enable and start forwarding service
  command: lxc exec {{ vm.name }} -- systemctl enable setup-forwarding.service
  register: enable_result
  changed_when: enable_result.rc == 0
  failed_when: false
  when: can_setup_forwarding and service_result.changed

- name: Start forwarding service
  command: lxc exec {{ vm.name }} -- systemctl start setup-forwarding.service
  register: start_result
  changed_when: start_result.rc == 0
  failed_when: false
  when: can_setup_forwarding and service_result.changed

- name: Save iptables rules
  shell: |
    lxc exec {{ vm.name }} -- bash -c "iptables-save > /etc/iptables/rules.v4"
    lxc exec {{ vm.name }} -- bash -c "ip6tables-save > /etc/iptables/rules.v6"
  register: save_result
  changed_when: save_result.rc == 0
  failed_when: false
  when: can_setup_forwarding