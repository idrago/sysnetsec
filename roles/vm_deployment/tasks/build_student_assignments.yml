# roles/vm_deployment/tasks/build_student_assignments.yml
---
# First process student groups to determine each student's VM types
- name: Initialize empty student assignments
  set_fact:
    student_assignments: {}
  changed_when: false

- name: Set default group assignment
  set_fact:
    default_group: "{{ ctf_environment.student_groups | selectattr('name', 'equalto', 'default') | first | default({'vm_types': [1]}) }}"
  changed_when: false

- name: Assign default group VMs to all students
  set_fact:
    student_assignments: "{{ student_assignments | combine({student_id | string: default_group.vm_types}) }}"
  loop: "{{ range(ctf_environment.students.start_id, ctf_environment.students.start_id + ctf_environment.students.count) | list }}"
  loop_control:
    loop_var: student_id
  changed_when: false

- name: Apply student group assignments (for groups with student_ids)
  include_tasks: apply_group_assignment.yml
  loop: "{{ ctf_environment.student_groups | selectattr('student_ids', 'defined') | list }}"
  loop_control:
    loop_var: group
  when: group.student_ids is defined
