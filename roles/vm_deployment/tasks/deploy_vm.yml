# roles/vm_deployment/tasks/deploy_vm.yml
---
# Look up VM type configuration
- name: Get VM type configuration
  set_fact:
    vm_type_config: "{{ ctf_environment.vm_types | selectattr('id', 'equalto', vm_type_id) | first | default({}) }}"
  changed_when: false

- name: Apply default values for missing configs
  set_fact:
    vm_config: "{{ ctf_environment.vm_defaults | combine(vm_type_config, recursive=True) }}"
  changed_when: false

- name: Create instance name and network details
  set_fact:
    instance_name: "student{{ '%02d' | format(student_id) }}-{{ vm_config.name }}"
    network_name: "vm{{ vm_type_id }}net"
    ip_address: "{{ ctf_environment.networking.base_subnet }}.{{ ctf_environment.networking.start_subnet - (vm_type_id - 1) }}.{{ student_id }}"
  changed_when: false

- name: Check if instance exists
  set_fact:
    instance_exists: "{{ instance_name in existing_instances }}"
  changed_when: false

- name: Deploy VM instance
  block:
    # Create VM with simple configuration
    - name: Create {{ vm_config.type | default('vm') }} - {{ instance_name }}
      command: >
        lxc launch {{ vm_config.image }}
        {{ instance_name }}
        {{ '--vm' if vm_config.type == 'vm' else '' }}
        --config=limits.cpu={{ vm_config.cpus }}
        --config=limits.memory={{ vm_config.memory }}MB
        --network {{ network_name }}
        --storage default
      register: instance_create
      failed_when: instance_create.rc != 0 and 'already exists' not in instance_create.stderr | default('')
      changed_when: instance_create.rc == 0
      when: not instance_exists

    # Wait for the instance to be ready before proceeding
    - name: Wait for instance to be ready
      command: lxc info {{ instance_name }}
      register: instance_info
      retries: 5
      delay: 2
      until: instance_info.rc == 0
      when: not instance_exists
    
    # Get the network device name from the instance
    - name: Get network devices for VM
      command: lxc config device list {{ instance_name }}
      register: device_list
      changed_when: false
      when: not instance_exists
      
    - name: Set network device name
      set_fact:
        nic_device: "{{ device_list.stdout.split('\n')[0] }}"
      when: 
        - not instance_exists
        - device_list.stdout is defined
        - device_list.stdout != ""
        
    - name: Set default device if none found
      set_fact:
        nic_device: "eth0"
      when: 
        - not instance_exists
        - (nic_device is not defined or nic_device == "")
        
    # - name: Configure static IP for new instance
    #   command: "lxc config device set {{ instance_name }} {{ nic_device }} ipv4.address={{ ip_address }}"
    #   register: ip_set
    #   changed_when: ip_set.rc == 0
    #   when: not instance_exists

    # Wait for VM agent to be ready before network configuration
    - name: Wait for VM agent to be ready for network configuration (60 seconds max)
      command: lxc exec {{ instance_name }} -- echo "VM agent is ready"
      register: agent_network_check
      failed_when: false
      changed_when: false
      until: agent_network_check.rc == 0
      retries: 12  # Try 12 times
      delay: 5     # 5 seconds between retries (60 seconds total)
      when: 
        - not instance_exists
        - vm_config.type == 'vm'

    - name: Find existing systemd network configuration files
      command: >
        lxc exec {{ instance_name }} -- find /etc/systemd/network/ -name "*.network"
      register: network_files
      changed_when: false
      when: 
        - not instance_exists
        - agent_network_check.rc == 0 or vm_config.type != 'vm'

    - name: Backup existing network configuration files
      command: >
        lxc exec {{ instance_name }} -- bash -c "for file in {{ network_files.stdout_lines | join(' ') }}; do mv $file $file.bak; done"
      when: 
        - not instance_exists
        - network_files.stdout != ""
        - agent_network_check.rc == 0 or vm_config.type != 'vm'

    - name: Create static network configuration file
      copy:
        content: |
          [Match]
          Name=enp5s0
          
          [Network]
          Address={{ ip_address }}/24
          Gateway={{ ctf_environment.networking.base_subnet }}.{{ ctf_environment.networking.start_subnet - (vm_type_id - 1) }}.1
          DNS=8.8.8.8 8.8.4.4
          Domains=~.
        dest: "/tmp/10-static.network"
      when: 
        - not instance_exists

    - name: Copy network file into VM
      command: >
        lxc file push /tmp/10-static.network {{ instance_name }}/etc/systemd/network/10-static.network
      register: network_config_copy
      changed_when: network_config_copy.rc == 0
      when: 
        - not instance_exists

    - name: Restart networking inside VM
      command: >
        lxc exec {{ instance_name }} -- systemctl restart systemd-networkd
      changed_when: true
      when: 
        - not instance_exists
        - agent_network_check.rc == 0 or vm_config.type != 'vm'

    # Wait for VM agent to be ready before installing packages
    - name: Wait for VM agent to be ready for package installation (60 seconds max)
      command: lxc exec {{ instance_name }} -- echo "VM agent is ready"
      register: agent_check
      failed_when: false
      changed_when: false
      until: agent_check.rc == 0
      retries: 12  # Try 12 times
      delay: 5     # 5 seconds between retries (60 seconds total)
      when: 
        - vm_config.packages is defined
        - vm_config.packages | length > 0
        - vm_config.type == 'vm'

    # package installation
    - name: Install packages
      command: >
        lxc exec {{ instance_name }} -- bash -c
        "DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y -q {{ vm_config.packages | join(' ') }}"
      register: package_install
      changed_when: package_install.rc == 0
      when: 
        - vm_config.packages is defined
        - vm_config.packages | length > 0
        - agent_check.rc == 0 or vm_config.type != 'vm'
      ignore_errors: yes        

  rescue:
    - name: Log failure
      debug:
        msg: "Failed to deploy {{ instance_name }}. Will continue with other instances."