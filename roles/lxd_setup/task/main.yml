# roles/lxd_setup/tasks/main.yml
---
- name: Check if LXD is installed
  command: which lxd
  register: lxd_check
  failed_when: false
  changed_when: false

- name: Install LXD if not installed
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"
        
    - name: Install snapd
      apt:
        name: snapd
        state: present
      when: ansible_os_family == "Debian"
        
    - name: Install LXD via snap
      snap:
        name: lxd
        state: present
  when: lxd_check.rc != 0

- name: Get current user
  command: whoami
  register: current_user
  changed_when: false
  become: no

- name: Check if user is in LXD group
  shell: "groups {{ current_user.stdout }} | grep -q '\\blxd\\b'"
  register: lxd_group_check
  failed_when: false
  changed_when: false

- name: Add user to LXD group if needed
  user:
    name: "{{ current_user.stdout }}"
    groups: lxd
    append: yes
  when: lxd_group_check.rc != 0

- name: Apply group changes in current session
  shell: newgrp lxd
  failed_when: false
  changed_when: true
  when: lxd_group_check.rc != 0

- name: Check if LXD is initialized
  command: lxc list
  register: lxc_list_check
  failed_when: false
  changed_when: false

- name: Initialize LXD if needed
  command: lxd init --auto
  become: yes
  when: "'To start your first container' in lxc_list_check.stdout or 'not found' in lxc_list_check.stderr | default('')"