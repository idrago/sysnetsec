# playbooks/cleanup.yml
---
- name: Clean up CTF Environment
  hosts: localhost
  gather_facts: no
  
  tasks:
    - name: Get all VMs and containers
      command: lxc list --format=json
      register: all_instances
      changed_when: false

    - name: Parse JSON output
      set_fact:
        instances: "{{ all_instances.stdout | from_json | default([]) }}"
      changed_when: false

    - name: List instance names
      debug:
        msg: "Found instances: {{ instances | map(attribute='name') | list }}"

    - name: Filter student VMs
      set_fact:
        student_instances: "{{ instances | selectattr('name', 'match', '^student[0-9]+-') | list }}"
      changed_when: false

    - name: List student instances
      debug:
        msg: "Student instances to clean up: {{ student_instances | map(attribute='name') | list }}"

    - name: Stop all student VMs
      command: lxc stop {{ item.name }} --force
      loop: "{{ student_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: stop_result
      failed_when: stop_result.rc != 0 and 'not found' not in stop_result.stderr
      changed_when: stop_result.rc == 0
      when: student_instances | length > 0

    - name: Delete all student VMs
      command: lxc delete {{ item.name }} --force
      loop: "{{ student_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: delete_result
      failed_when: delete_result.rc != 0 and 'not found' not in delete_result.stderr
      changed_when: delete_result.rc == 0
      when: student_instances | length > 0

    - name: Get all networks
      command: lxc network list --format=json
      register: all_networks
      changed_when: false

    - name: Parse network JSON
      set_fact:
        networks: "{{ all_networks.stdout | from_json | default([]) }}"
      changed_when: false

    - name: List network names
      debug:
        msg: "Found networks: {{ networks | map(attribute='name') | list }}"

    - name: Filter VM networks
      set_fact:
        vm_networks: "{{ networks | selectattr('name', 'match', '^vm[0-9]+net') | list }}"
      changed_when: false

    - name: List VM networks
      debug:
        msg: "VM networks to clean up: {{ vm_networks | map(attribute='name') | list }}"

    - name: Delete VM networks
      command: lxc network delete {{ item.name }}
      loop: "{{ vm_networks }}"
      loop_control:
        label: "{{ item.name }}"
      register: network_delete
      failed_when: network_delete.rc != 0 and 'not found' not in network_delete.stderr
      changed_when: network_delete.rc == 0
      when: vm_networks | length > 0

    - name: Clean up WireGuard config directory
      file:
        path: "{{ wireguard_config_dir | default('.vpnconfig') }}"
        state: absent
      changed_when: true

    - name: Show cleanup summary
      debug:
        msg: "Removed {{ student_instances | length }} VMs and {{ vm_networks | length }} networks"