# playbooks/infrastructure.yml
---
- name: Set up CTF Environment Infrastructure
  hosts: localhost
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Include LXD setup role
      include_role:
        name: lxd_setup
      tags: [setup, lxd]
    
    - name: Include networking role
      include_role:
        name: networking
      tags: [setup, network]
    
    - name: Include VM deployment role
      include_role:
        name: vm_deployment
      tags: [setup, vm]
      
    - name: Include VM configuration role
      include_role:
        name: vm_configuration
      tags: [setup, vm, configure]
    
    - name: Stop all VMs
      include_role:
        name: vm_management
        tasks_from: stop.yml
      tags: [stop]
      when: "'stop' in ansible_run_tags"

    - name: Show environment status
      include_role:
        name: vm_management
        tasks_from: status.yml
      tags: [status]
      when: "'status' in ansible_run_tags"
  
  post_tasks:
    - name: Print environment summary
      debug:
        msg: "CTF environment setup complete"
      tags: [setup, summary]
      when: "'stop' not in ansible_run_tags and 'status' not in ansible_run_tags"
      
    - name: Show VM IP addresses
      shell: "lxc list --format=json"
      register: vm_list
      changed_when: false
      tags: [setup, summary, status]
      when: "'stop' not in ansible_run_tags"
      
    - name: Display VM information
      debug:
        msg: "{{ item.name }}: {{ item.state.network.eth0.addresses[0].address }}"
      loop: "{{ vm_list.stdout | from_json }}"
      when: 
        - item.state is defined 
        - item.state.network is defined
        - item.state.network.eth0 is defined
        - item.state.network.eth0.addresses is defined
        - "'stop' not in ansible_run_tags"
      tags: [setup, summary, status]