---
- name: Prepare the VM
  hosts: all
  gather_facts: true
  become: true

  vars:
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    registry_host: "192.168.129.137:5000"  # TODO: This should come from the inventory
    docker_network: "10.128.0.0/9"         # Container network
  tasks:
    - name: Generate random passwords
      set_fact:
        random_vagrant_password: "{{ lookup('password', '/dev/null length=12 chars=ascii_letters,digits') }}"
        random_student_password: "{{ lookup('password', '/dev/null length=12 chars=ascii_letters,digits') }}"

    - name: Update user passwords
      loop:
        - name: vagrant
          password: "{{ random_vagrant_password }}"
        - name: student
          password: "{{ random_student_password }}"
      ansible.builtin.user:
        name: "{{ item.name }}"
        password: "{{ item.password | password_hash('sha512') }}"
        state: present
        shell: /bin/bash

    - name: Print random passwords to log
      ansible.builtin.debug:
        msg: 
          - "Vagrant password: {{ random_vagrant_password }}"
          - "Student password: {{ random_student_password }}"

    # Network configuration
    - name: Enable IPv4 forwarding
      lineinfile:
        path: /etc/sysctl.conf
        line: 'net.ipv4.ip_forward=1'
        regexp: '^net.ipv4.ip_forward='
        create: yes

    - name: Apply sysctl settings
      command: sysctl -p
      changed_when: false

    # Install Python packages
    - name: Install Python and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-yaml
        state: present
        update_cache: yes

    # Docker installation following official Debian instructions
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker's GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc

    - name: Add Docker repository
      shell: |
        echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian \
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
        tee /etc/apt/sources.list.d/docker.list > /dev/null

    - name: Update apt cache (after adding Docker repository)
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Configure Docker daemon to use registry mirror
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "registry-mirrors": ["http://{{ registry_host }}"],
            "insecure-registries": ["{{ registry_host }}"]
          }

    - name: Create Docker service directory
      file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: '0755'

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart Docker service
      systemd:
        name: docker
        state: restarted

    - name: Configure Docker
      block:
        - name: Add vagrant user to docker group
          user:
            name: vagrant
            groups: docker
            append: yes


    - name: Configure iptables forwarding rules
      block:
        - name: Create iptables rules script
          copy:
            dest: /usr/local/bin/setup-forwarding.sh
            mode: '0755'
            content: |
              #!/bin/bash
              # Allow forwarding
              iptables -P FORWARD ACCEPT
              
              # Clear any existing rules
              iptables -F FORWARD
              
              # Allow container network traffic
              iptables -A FORWARD -i eth0 -d {{ docker_network }} -j ACCEPT
              iptables -A FORWARD -s {{ docker_network }} -o eth0 -j ACCEPT
            
        - name: Create systemd service for iptables rules
          copy:
            dest: /etc/systemd/system/setup-forwarding.service
            content: |
              [Unit]
              Description=Setup IP forwarding rules
              After=docker.service
              
              [Service]
              Type=oneshot
              ExecStart=/usr/local/bin/setup-forwarding.sh
              RemainAfterExit=yes
              
              [Install]
              WantedBy=multi-user.target

        - name: Enable and start forwarding service
          systemd:
            name: setup-forwarding
            enabled: yes
            state: started
            daemon_reload: yes

    - name: Install iptables-persistent
      apt:
        name: iptables-persistent
        state: present
        
    - name: Save iptables rules
      shell: |
        iptables-save > /etc/iptables/rules.v4
        ip6tables-save > /etc/iptables/rules.v6

    # Optional: Add monitoring tools
    - name: Install network utilities
      apt:
        name:
          - net-tools
          - tcpdump
          - bridge-utils
        state: present            