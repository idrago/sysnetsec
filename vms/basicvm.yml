---
- name: Prepare the VM
  hosts: all
  gather_facts: true
  become: true

  vars:
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    registry_host: "192.168.129.137:5000"  # TODO: This should come from the inventory
  tasks:
    - name: Generate random passwords
      set_fact:
        random_vagrant_password: "{{ lookup('password', '/dev/null length=12 chars=ascii_letters,digits') }}"
        random_student_password: "{{ lookup('password', '/dev/null length=12 chars=ascii_letters,digits') }}"

    - name: Update user passwords
      loop:
        - name: vagrant
          password: "{{ random_vagrant_password }}"
        - name: student
          password: "{{ random_student_password }}"
      ansible.builtin.user:
        name: "{{ item.name }}"
        password: "{{ item.password | password_hash('sha512') }}"
        state: present
        shell: /bin/bash

    - name: Print random passwords to log
      ansible.builtin.debug:
        msg: 
          - "Vagrant password: {{ random_vagrant_password }}"
          - "Student password: {{ random_student_password }}"

    # Install Python packages
    - name: Install Python and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-yaml
        state: present
        update_cache: yes

    # Docker installation following official Debian instructions
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker's GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc

    - name: Add Docker repository
      shell: |
        echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian \
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
        tee /etc/apt/sources.list.d/docker.list > /dev/null

    - name: Update apt cache (after adding Docker repository)
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Configure Docker daemon to use registry mirror
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "registry-mirrors": ["http://{{ registry_host }}"],
            "insecure-registries": ["{{ registry_host }}"]
          }

    - name: Create Docker service directory
      file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: '0755'

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart Docker service
      systemd:
        name: docker
        state: restarted

    - name: Configure Docker
      block:
        - name: Add vagrant user to docker group
          user:
            name: vagrant
            groups: docker
            append: yes