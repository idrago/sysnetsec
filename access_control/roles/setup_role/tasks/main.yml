- name: Copy the Dockerfiles
  ansible.builtin.copy:
    src: "access_control_{{ setup_number }}"
    dest: "/home/vagrant/"
  become_user: vagrant

- name: Generate flag with random content
  ansible.builtin.set_fact:
    generated_flag: "flag:{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
  become_user: vagrant

- name: Create flag file with random content
  ansible.builtin.shell:
    cmd: echo "{{ generated_flag }}" > "/home/vagrant/access_control_{{ setup_number }}/flag"
  become_user: vagrant

- name: Display the generated flag
  ansible.builtin.debug:
    msg: "access_control_{{ setup_number }} flag: {{ generated_flag }}"
