# inventory/group_vars/all.yml
---
ctf_environment:

  students:
    count: 2
    start_id: 2
  
  # Default VM configuration
  vm_defaults:
    cpus: 1
    memory: 512    # MB
    disk_size: 10  # GB
    image: "images:debian/12"
    type: "vm"     # Can be "vm" or "container"
  
  # Network configuration
  networking:
    base_subnet: "192.168"
    start_subnet: 254
  
  # WireGuard configuration
  wireguard:
    server_ip: "REDACTED_IP_1"
    server_port: "REDACTED_PORT"
    network: "10.13.0.0/24"
    server_ip_internal: "10.13.0.1"
    client_prefix: "10.13.0"
    student_visible_network: "10.128.0.0/9"
    internet_interface: "bond0"
    blocked_networks: "192.168.0.0/16"
  
  # VM type definitions with custom configurations
  vm_types:
    # VM Type 1
    - id: 1
      name: "vm1"
      type: "vm"
      cpus: 2
      memory: 1024
      disk_size: 10
      image: "images:debian/12"
      packages:
        - iptables-persistent
        - docker.io
        - docker-compose
        - python3
        - python3-pip
        - python3-yaml
        - net-tools
        - tcpdump
        - bridge-utils
      subnet_range: "10.128.0.0/10"
    
    # VM Type 2
    - id: 2
      name: "vm2"
      type: "vm"  
      cpus: 2
      memory: 512
      disk_size: 10
      image: "images:debian/12"
      packages:
        - iptables-persistent
        - docker.io
        - docker-compose
        - python3
        - python3-pip
        - python3-yaml
        - net-tools
        - tcpdump
        - bridge-utils
      subnet_range: "10.192.0.0/10"
    
    # VM Type 3
    - id: 3
      name: "vm3"
      type: "vm"
      cpus: 2
      memory: 512
      disk_size: 10
      image: "images:debian/12"
      packages:
        - iptables-persistent
        - docker.io
        - docker-compose
        - python3
        - python3-pip
        - python3-yaml
        - net-tools
        - tcpdump
        - bridge-utils
      subnet_range: "10.160.0.0/11"
    
  # Custom VM assignments per student group
  student_groups:
    # Default group (if no specific group is assigned)
    - name: "default"
      vm_types: [1, 2, 3]
    
    # # Advanced group with more VMs
    # - name: "advanced"
    #   vm_types: [1, 2, 3]
    #   student_ids: [10, 11, 12, 13, 14]