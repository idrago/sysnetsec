category_name: docker_escapes

network:
  name: ctf_network
  subnet: 10.128.0.0/9

# Default service configuration for all exercises
service_defaults:
  init: true
  tty: true
  restart: unless-stopped
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3

# VM-level flags configuration
vm_flags:
  host_root_flag:
    vm_types: ["vm1"]  # VM types where this flag should be deployed
    path: "/root/host_flag.txt"  # Path on the VM where flag should be placed
    permissions: "400"  # File permissions
    owner: "root:root"  # File owner
    
  privileged_flag:
    vm_types: ["vm2"]
    path: "/opt/secret_flag/flag.txt"
    permissions: "400"
    owner: "root:root"

exercises:
  base_path: /home/vagrant
  default_address:
    ip: 10.128.0.0/9   
  capabilities:
    drop: ['ALL']
    add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE']
  ssh:
    base_port: 22 
  
  configs:
    0:
      name: dangerous_mount
      description: "Escape Docker container through dangerous volume mounts"
      address:
        ip: 10.128.0.10/32
      volumes:
        - "/var/run/docker.sock:/var/run/docker.sock:rw"  # Dangerous mount of Docker socket
      environment:
        - "EXERCISE_TYPE=docker_socket_mount"
        - "DIFFICULTY=medium"
      flag_in_container: false  # Flag is not in container but on the VM host
    
    1:
      name: excessive_capabilities
      description: "Escape Docker container through excessive capabilities"
      capabilities:
        add: ['SYS_ADMIN', 'NET_ADMIN', 'SYS_PTRACE', 'SYS_MODULE', 'DAC_READ_SEARCH', 'DAC_OVERRIDE']
      address:
        ip: 10.192.0.10/32
      environment:
        - "EXERCISE_TYPE=capability_abuse"
        - "DIFFICULTY=hard"
      flag_in_container: false  # Flag is not in container but on the VM host

vms:
  pattern:
    student_prefix: "student"
    vagrant_path: "../vms/.vagrant/machines"
    vm_provider: "libvirt"
  
  groups:
    # VM for dangerous mount exercise
    lab01:
      range: [2, 2]
      ssh_user: vagrant
      ssh_key_template: "{vagrant_path}/{student_prefix}{id}-{vm_suffix}/{vm_provider}/private_key"
      base_ip: 192.198.254.0/24
      vm_suffix: "vm1"
      exercises: [0]  # Dangerous mount exercise
    
    # VM for excessive capabilities exercise
    lab02:
      range: [2, 2]
      ssh_user: vagrant
      ssh_key_template: "{vagrant_path}/{student_prefix}{id}-{vm_suffix}/{vm_provider}/private_key"
      base_ip: 192.198.253.0/24
      vm_suffix: "vm2"
      exercises: [1]  # Excessive capabilities exercise