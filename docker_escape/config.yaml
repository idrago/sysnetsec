network:
  name: ctf_network
  subnet: 10.128.0.0/9

# Default service configuration for all exercises
service_defaults:
  init: true
  tty: true
  restart: unless-stopped
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 3
  build: 
    context: "./docker_escape"
    dockerfile: "Dockerfile"
  cap_drop: ['ALL']
  cap_add: ['CHOWN', 'SETGID', 'SETUID', 'SYS_CHROOT', 'AUDIT_WRITE']

# VM-level flags configuration
vm_flags:
  host_root_flag:
    vm_types: ["vm1"]
    path: "/root/host_flag.txt"
    permissions: "400"
    owner: "root:root"
    
  privileged_flag:
    vm_types: ["vm2"]
    path: "/opt/secret_flag/flag.txt"
    permissions: "400"
    owner: "root:root"

exercises:
  base_path: /home/vagrant
  
  configs:
    0:
      name: dangerous_mount
      description: "Escape Docker container through dangerous volume mounts"
      address: 10.128.0.10/32
      volumes:
        - "/var/run/docker.sock:/var/run/docker.sock:rw"
      environment:
        - "EXERCISE_TYPE=docker_socket_mount"
        - "DIFFICULTY=medium"
    
    1:
      name: excessive_capabilities
      description: "Escape Docker container through excessive capabilities"
      address: 10.192.0.10/32
      cap_add: ['SYS_ADMIN', 'NET_ADMIN', 'SYS_PTRACE', 'SYS_MODULE', 'DAC_READ_SEARCH', 'DAC_OVERRIDE']
      environment:
        - "EXERCISE_TYPE=capability_abuse"
        - "DIFFICULTY=hard"

vms:
  student_prefix: "student"
  vagrant_path: "vms/.vagrant/machines"
  vm_provider: "libvirt"
  
  groups:
    # VM for dangerous mount exercise
    lab01:
      range: [2, 2]
      ssh_user: vagrant
      ssh_key: "{vagrant_path}/{student_prefix}{id}-{vm_suffix}/{vm_provider}/private_key"
      ip_network: 192.198.254.0/24
      vm_suffix: "vm1"
      exercises: [0]
    
    # VM for excessive capabilities exercise
    lab02:
      range: [2, 2]
      ssh_user: vagrant
      ssh_key: "{vagrant_path}/{student_prefix}{id}-{vm_suffix}/{vm_provider}/private_key"
      ip_network: 192.198.253.0/24
      vm_suffix: "vm2"
      exercises: [1]